<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Table Planner</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Wedding Table Planner</h1>

      <div class="controls">
        <button id="clearAll">Clear All Tables</button>
        <button id="saveProgress">Save Progress</button>
        <button id="guestInfoBtn">Guest Info</button>
        <div class="status" id="statusMessage"></div>
      </div>

      <!-- Top‐level editor row: Guest List (left) | Table Settings (right) -->
      <div class="editors">
        <div id="guestEditor" class="editor-box">
          <h2>Edit Guest List</h2>
          <div class="editor-inputs">
            <input type="text" id="guestNameInput" placeholder="Guest Name" />
            <input
              type="number"
              id="guestCountInput"
              placeholder="Count"
              min="1"
            />
            <button id="addGuestBtn">Add Guest</button>
          </div>
          <ul id="guestEditorList" class="editor-list"></ul>
        </div>

        <div id="tableEditor" class="editor-box">
          <h2>Table Settings</h2>
          <div class="editor-inputs">
            <label>
              # of Tables:
              <input type="number" id="numTablesInput" min="1" step="1" />
            </label>
            <label>
              Seats/Table:
              <input type="number" id="seatsPerTableInput" min="1" step="1" />
            </label>
            <button id="applyTableSettingsBtn">Apply Settings</button>
          </div>
        </div>
      </div>

      <div class="planner">
        <div class="guest-list" id="guestList">
          <h2>Guest List</h2>
          <div class="guests-container" id="guestsContainer"></div>
        </div>

        <div class="tables-container" id="tablesContainer">
          <h2>Tables</h2>
          <div class="tables" id="tables"></div>
        </div>
      </div>

      <div id="guest-info-container">
        <h2>Guest Info</h2>
        <div id="guest-info"></div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
